name: Release

# Triggered when a tag like v0.0.4 is pushed. The job runs on macos-latest
# (the only runner that can cross-compile to *every* target — macOS in
# particular requires running on macOS to build).
#
# Flow:
#   1. Operator edits VERSION on a branch, commits, tags v<VERSION>, pushes the tag.
#   2. This workflow runs scripts/release.sh on macos-latest.
#   3. The script runs `zig build packageall -Doptimize=ReleaseFast -Dfetch-msvc`.
#      .NET 8 is installed for `vpk`; `-Dfetch-msvc` downloads MSVC + Windows SDK
#      into .velopack-msvc/ on first use (needs network; can take several minutes).
#   4. The script uploads installers, nupkgs, and manifests to a *draft* GitHub
#      release named v<VERSION>.
#   5. Operator reviews the draft release in the browser and clicks Publish.
#      Auto-update only sees the release after it's published.
#
# Signing (optional — falls back to unsigned macOS builds when secrets aren't set):
#   Required secrets to enable macOS signing + notarization in CI:
#     PIXI_MACOS_CERT_P12_BASE64   - base64-encoded .p12 with Developer ID Application
#                                    AND Developer ID Installer certs (combined)
#     PIXI_MACOS_CERT_PASSWORD     - the password for that .p12
#     PIXI_MACOS_SIGN_APP          - "Developer ID Application: NAME (TEAMID)"
#     PIXI_MACOS_SIGN_INSTALLER    - "Developer ID Installer: NAME (TEAMID)"
#     PIXI_APPLE_ID                - Apple ID email used for notarization
#     PIXI_APPLE_APP_PASSWORD      - app-specific password (appleid.apple.com)
#     PIXI_APPLE_TEAM_ID           - 10-char team ID
#
# GITHUB_TOKEN is provided automatically by Actions; the job sets GH_TOKEN so
# `gh` in scripts/release.sh is authenticated without a separate login step.

on:
  push:
    tags:
      - "v*"
  # Also expose a manual trigger so we can re-run a release without retagging.
  # The release tag must already exist on the repo when running this manually.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.0.4)"
        required: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ZIG_VERSION: "0.16.0"

jobs:
  release:
    runs-on: macos-latest
    # Secrets for signing/notarization live in Settings → Environments → pixi_release
    # (repository-level Actions secrets work too if you prefer).
    environment: pixi_release
    permissions:
      contents: write # required for `gh release create`

    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/zig-global-cache
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # If triggered manually, check out the tag passed via input. For tag
          # pushes, the default ref already points at the tag commit.
          ref: ${{ github.event.inputs.tag || github.ref }}
          # The release script verifies the tag exists locally and points at
          # HEAD, so we need the tag refs in the shallow clone.
          fetch-tags: true
          fetch-depth: 0

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          cache-key: ${{ hashFiles('build.zig.zon') }}

      # mlugg/setup-zig overrides ZIG_GLOBAL_CACHE_DIR / ZIG_LOCAL_CACHE_DIR
      # to `.zig-cache` for its caching layer, so the tmp/ pre-create has to
      # happen AFTER that step (otherwise we create tmp/ under a path Zig
      # never touches and the fetch still fails with FileNotFound).
      #
      # The bug being worked around: Zig 0.16's Fetch.zig#unzip calls
      # createFile() on <cache>/tmp/<hex>.zip without ensuring tmp/ exists.
      # The first zip-archive dependency (velopack libc here) trips it on
      # fresh CI runners. Pre-creating tmp/ is the standard workaround.
      - name: Pre-create Zig cache tmp/
        shell: bash
        run: |
          mkdir -p "$ZIG_GLOBAL_CACHE_DIR/tmp"
          [[ "$ZIG_LOCAL_CACHE_DIR" != "$ZIG_GLOBAL_CACHE_DIR" ]] && mkdir -p "$ZIG_LOCAL_CACHE_DIR/tmp" || true

      - name: Setup .NET (for Velopack vpk)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      # Pre-fetch dependencies separately from the release build so transient
      # GitHub fetch flakes (HttpConnectionClosing) don't tank an otherwise
      # working release. Zig 0.16 doesn't retry these internally.
      # We fetch for both the native macOS target AND windows-msvc so the
      # `packageall` step (which forks per-target `zig build package` runs)
      # doesn't re-hit the network from a cold global cache.
      - name: Fetch deps with retries
        shell: bash
        run: |
          fetch() {
            local args="$1"
            local n=0
            until [ "$n" -ge 5 ]; do
              zig build --fetch $args && return 0
              n=$((n+1))
              echo "Fetch attempt $n ($args) failed, sleeping $((n*10))s..."
              sleep $((n*10))
            done
            return 1
          }
          fetch "" && fetch "-Dtarget=x86_64-windows-msvc"

      # ----- macOS signing setup (optional) ------------------------------
      # If the cert secrets are configured, import them into a temporary
      # keychain that lives only for this job. If not, skip — release.sh
      # detects unset PIXI_MACOS_SIGN_APP and produces unsigned builds.
      #
      # Why the indirection via `signing_config` outputs instead of just
      # `if: ${{ secrets.X != '' }}`: workflow validation fails with
      # "Unrecognized named-value: 'secrets'" when secrets appear in an
      # `if:` condition on a job that has `environment:` set. Reading
      # secrets via a step's `env:` block IS allowed, so we read them
      # there and emit booleans on $GITHUB_OUTPUT for later steps to gate
      # on. This step also doubles as a diagnostic line: the next CI
      # run's first signing-related output tells you immediately whether
      # the secrets were detected.
      #
      # Why apple-actions/import-codesign-certs instead of rolling our
      # own `security import` flow: the manual path has multiple
      # footguns. `security import ... -t cert -f pkcs12` silently drops
      # the private key from the .p12 (then `set-key-partition-list`
      # fails with `SecItemCopyMatching: item could not be found`).
      # Partition list and search list ordering also have to be exact
      # or codesign / productsign can't find the identity later.

      - name: Check signing config
        id: signing_config
        env:
          HAS_CERT: ${{ secrets.PIXI_MACOS_CERT_P12_BASE64 != '' }}
          HAS_NOTARY: ${{ secrets.PIXI_APPLE_ID != '' }}
        run: |
          echo "cert=$HAS_CERT" >> "$GITHUB_OUTPUT"
          echo "notary=$HAS_NOTARY" >> "$GITHUB_OUTPUT"
          if [[ "$HAS_CERT" == "true" ]]; then
            echo "macOS signing: ENABLED"
          else
            echo "macOS signing: disabled (PIXI_MACOS_CERT_P12_BASE64 not set)"
          fi
          if [[ "$HAS_NOTARY" == "true" ]]; then
            echo "Notarization:  ENABLED"
          else
            echo "Notarization:  disabled (PIXI_APPLE_ID not set)"
          fi

      - name: Import signing certificate
        if: steps.signing_config.outputs.cert == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.PIXI_MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.PIXI_MACOS_CERT_PASSWORD }}
          # One-shot keychain unique to this job; torn down at job end.
          keychain: pixi-release
          create-keychain: true

      - name: Configure notarytool credentials
        if: steps.signing_config.outputs.notary == 'true'
        env:
          APPLE_ID: ${{ secrets.PIXI_APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.PIXI_APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.PIXI_APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "pixi-ci-notary" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          # Tell release.sh to pass this profile to vpk for notarization.
          # Done via $GITHUB_ENV rather than a step env entry on the next
          # step because the latter would have to be a ternary on a
          # `secrets.*` expression, which fails validation under
          # `environment:`. This way the env var only exists when the
          # profile was actually created, which is what release.sh expects.
          echo "PIXI_MACOS_NOTARY_PROFILE=pixi-ci-notary" >> "$GITHUB_ENV"

      # ----- run the release ---------------------------------------------

      - name: Run release script
        env:
          PIXI_MACOS_SIGN_APP: ${{ secrets.PIXI_MACOS_SIGN_APP }}
          PIXI_MACOS_SIGN_INSTALLER: ${{ secrets.PIXI_MACOS_SIGN_INSTALLER }}
          # PIXI_MACOS_NOTARY_PROFILE is set by the notarytool step via
          # $GITHUB_ENV when notarization is enabled, otherwise it stays
          # unset and release.sh skips the --notaryProfile vpk flag.
          # Leave the release as a draft so the operator publishes manually.
          # Set PIXI_RELEASE_PUBLISH=1 here once you trust the pipeline end-to-end.
          PIXI_RELEASE_PUBLISH: "0"
        run: ./scripts/release.sh
